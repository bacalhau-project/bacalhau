version: 2

# One cross-ecosystem PR keeps the weekly update and release cycle atomic.
multi-ecosystem-groups:
  weekly-dependencies:
    schedule:
      interval: weekly
      day: sunday
      time: "00:00"
      timezone: America/Los_Angeles
    labels:
      - dependencies
      - weekly-release

updates:
  - package-ecosystem: gomod
    directory: "/"
    labels: ["lang/go", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      prefix-development: dev-deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: gomod
    directory: "/test_integration"
    labels: ["lang/go", "dependencies", "test", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: gomod
    directory: "/pkg/executor/wasm/funcs/http/client"
    labels: ["lang/go", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: npm
    directory: "/webui"
    labels: ["lang/javascript", "dependencies", "webui", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
    ignore:
      - dependency-name: eslint
        versions:
          - '>=10.0.0 <11.0.0'
  - package-ecosystem: pip
    directory: "/"
    labels: ["lang/python", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: pip
    directory: "/ops"
    labels: ["lang/python", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: pip
    directory: "/python"
    labels: ["lang/python", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: pip
    directory: "/clients/python"
    labels: ["lang/python", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: github-actions
    directory: "/"
    labels: ["lang/github-actions", "dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: docker
    directory: "/docker/bacalhau-base"
    labels: ["dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: docker
    directory: "/docker/bacalhau-dind"
    labels: ["dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: docker
    directory: "/docker/ignite-image"
    labels: ["dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: docker
    directory: "/pkg/executor/docker/gateway"
    labels: ["dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: docker
    directory: "/docker-compose-deployment"
    labels: ["dependencies", "weekly-release"]
    open-pull-requests-limit: 5
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
  - package-ecosystem: docker
    directory: "/test_integration/common_assets/dockerfiles"
    labels: ["dependencies", "test", "weekly-release"]
    open-pull-requests-limit: 5
    patterns:
      - '*'
    multi-ecosystem-group: weekly-dependencies
