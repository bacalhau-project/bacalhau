name: Static Analysis

on:
  workflow_call:
    inputs:
      go_version_file:
        description: 'Path to the file containing Go version'
        required: false
        default: 'go.work'
        type: string
      golangci_lint_version:
        description: 'Version of golangci-lint to use'
        required: false
        default: 'v2.12.2'
        type: string
      new_from_rev:
        description: 'Only report lint issues introduced after this git revision'
        required: false
        default: ''
        type: string

jobs:
  analyze:
    name: Static Analysis
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: ${{ inputs.new_from_rev != '' && '0' || '1' }}

      - name: Verify lint baseline
        if: inputs.new_from_rev != ''
        env:
          BASELINE_REF: ${{ inputs.new_from_rev }}
        run: git rev-parse --verify "${BASELINE_REF}^{commit}"

      # Setup Go with caching
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: ${{ inputs.go_version_file }}

      # Run all static analysis checks
      - name: Codespell
        run: |
          # Install cspell for spell checking
          yarn global add cspell@8.19.4
          make spellcheck-code

      # Run swagger validation to ensure API documentation is correct
      - name: Validate Swagger
        uses: ./.github/actions/swagger-validation
        id: swagger-validation

      # Run pre-commit hooks if enabled
      - name: Run pre-commit checks
        run: |
          # Install pre-commit
          python -m pip install pre-commit

          # Run all pre-commit hooks on all files
          pre-commit run --show-diff-on-failure --color=always --all-files

      # Run golangci-lint
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: ${{ inputs.golangci_lint_version }}
          args: >-
            --timeout=5m --verbose
            ${{ inputs.new_from_rev != '' && format('--new-from-rev={0}', inputs.new_from_rev) || '' }}
          only-new-issues: ${{ inputs.new_from_rev == '' }}

      # Summarize results
      - name: Summary
        if: always()
        run: |
          echo "## Static Analysis Results" >> "$GITHUB_STEP_SUMMARY"
          
          # Check if there were any failures and report them
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All static analysis checks passed!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some static analysis checks failed. Please see the job logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi
