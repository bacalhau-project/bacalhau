version: "2"
run:
  modules-download-mode: readonly
  issues-exit-code: 2
  tests: false
  allow-parallel-runners: false
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - errcheck
    - forbidigo
    - funlen
    - gochecknoinits
    - goconst
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/sirupsen/logrus
              desc: logging is allowed only by zerolog
    dupl:
      threshold: 100
    forbidigo:
      forbid:
        - pattern: fmt\.Print.*
    funlen:
      lines: 100
      statements: 100
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - hugeParam
        - importShadow
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 18
    govet:
      enable:
        - shadow
    lll:
      line-length: 140
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
      ignored-functions:
        - strings.SplitN
        - time.Duration
        - types.Duration
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: 'shadow: declaration of "err" shadows declaration at'
      # QF* are staticcheck quickfix suggestions (stylistic only, not correctness).
      - linters:
          - staticcheck
        text: '^QF[0-9]+'
    paths:
      - webui/webui.go
      - experimental$
      - vendor$
      - viz$
      - ops$
      - testdata$
      - node_modules
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/golangci/golangci-lint
  exclusions:
    generated: lax
    paths:
      - webui/webui.go
      - experimental$
      - vendor$
      - viz$
      - ops$
      - node_modules
      - testdata$
